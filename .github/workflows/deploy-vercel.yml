# Deploy to Vercel — DISABLED BY DEFAULT
#
# This workflow deploys the app to Vercel on every push to main.
# It requires a VERCEL_TOKEN repository secret to be configured.
#
# Setup instructions:
#   1. Install the Vercel CLI locally and run `vercel link` inside the project
#      directory to generate .vercel/project.json.  From that file, copy the
#      values of `orgId` and `projectId`.
#   2. In GitHub → Settings → Secrets and variables → Actions, add:
#        VERCEL_TOKEN      — your Vercel personal access token
#        VERCEL_ORG_ID     — the orgId from step 1
#        VERCEL_PROJECT_ID — the projectId from step 1
#   3. Remove or comment-out the `if: false` line below to enable the workflow.

name: Deploy to Vercel

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: false # Remove this line after adding VERCEL_TOKEN to repository secrets

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
